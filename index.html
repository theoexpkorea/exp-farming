<!DOCTYPE html>
<html lang="ko">
<head>
<meta property="og:title" content="theo · 파밍 스캔">
<meta property="og:description" content="필드에서 바로 쓰는 파밍 매물 관리 시스템입니다.">
<meta property="og:image" content="https://theoexpkorea.github.io/exp-farming/og-image-v2.png">
<meta property="og:url" content="https://theoexpkorea.github.io/exp-farming/">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#143C28">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>파밍서치</title>
<style>
:root{
  --bg:#F4F5F7; --surface:#FFFFFF; --ink:#15181E; --muted:#727A86;
  --line:#E6E8EC; --line-2:#EEF0F3; --accent:#2746E6; --accent-soft:#EEF1FE;
  --sale:#1F7A4D; --sale-bg:#E7F4ED; --jeonse:#9A5B14; --jeonse-bg:#FBF1E2;
  --wolse:#2746E6; --wolse-bg:#EEF1FE; --chip:#F1F2F5;
  --danger:#E03A3A; --danger-bg:#FBEAEA;
  --gray:#727A86; --gray-bg:#F1F2F5;
  --brand-dark:#143C28; --brand:#2E6B52; --brand-2:#3C9670; --gold:#D9A441;
  --shadow:0 1px 2px rgba(20,24,32,.04),0 6px 16px rgba(20,24,32,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overscroll-behavior-y:none;height:100%}
*{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
body{
  font-family:"Pretendard","Pretendard Variable",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none; padding-bottom:96px;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

/* ---- 데스크탑 폭 제한 (모바일 앱처럼 보이게) ---- */
.app-shell{max-width:480px;margin:0 auto;position:relative}
@media (min-width:560px){
  .app-shell{box-shadow:0 0 0 1px var(--line);min-height:100vh}
  body{background:#E7E9ED}
}
#fabWrap{position:fixed;inset:0;max-width:480px;margin:0 auto;pointer-events:none;z-index:40}

/* ---- 비밀번호 화면 ---- */
#lockScreen{
  position:fixed; inset:0; z-index:999; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:32px 24px; padding-top:calc(env(safe-area-inset-top) + 32px);
}
#lockScreen .lock-logo{font-size:28px;font-weight:800;letter-spacing:-.04em;margin-bottom:6px;color:var(--ink)}
#lockScreen .lock-logo .o{color:var(--brand-2)}
#lockScreen .lock-sub{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:40px}
#lockScreen .lock-box{width:100%;max-width:320px;background:var(--surface);border-radius:18px;padding:28px 24px;box-shadow:var(--shadow);border:1px solid var(--line)}
#lockScreen .lock-title{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:16px;text-align:center}
#lockScreen .lock-input{width:100%;height:52px;border:1px solid var(--line);border-radius:12px;background:var(--bg);padding:0 16px;font-size:20px;font-family:inherit;text-align:center;letter-spacing:6px;outline:0;color:var(--ink);font-variant-numeric:tabular-nums;margin-bottom:12px}
#lockScreen .lock-input:focus{border-color:var(--brand-2);background:#fff}
#lockScreen .lock-btn{width:100%;height:52px;border:0;border-radius:13px;background:var(--brand-2);color:#fff;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit;transition:.12s}
#lockScreen .lock-btn:active{opacity:.85}
#lockScreen .lock-err{font-size:13px;font-weight:700;color:var(--danger);text-align:center;margin-top:10px;min-height:20px}

/* ---- 헤더 ---- */
header{background:var(--surface); border-bottom:1px solid var(--line); padding:calc(env(safe-area-inset-top) + 12px) 12px 0; position:sticky; top:0; z-index:30}
.head-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:baseline;gap:8px;cursor:pointer}
.brand .logo{font-size:20px;font-weight:800;letter-spacing:-.04em;margin:0;color:var(--ink);line-height:1}
.brand .logo .o{color:var(--brand-2)}
.brand .by{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.02em}
.head-actions{display:flex;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:15px}
.icon-btn:active{background:var(--line-2);color:var(--brand-2)}
.icon-btn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ---- 날짜 바 ---- */
.datebar{display:flex;align-items:center;gap:8px;margin-top:12px}
.datebar .navbtn{width:32px;height:32px;border-radius:9px;background:var(--chip);color:var(--muted);display:grid;place-items:center;flex:none;font-size:15px}
.datebar .navbtn:active{background:var(--line-2)}
.datebar .datepill{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--brand);color:#fff;border-radius:11px;padding:10px 10px;font-weight:800;font-size:14.5px;letter-spacing:-.01em}
.datebar .datepill .wd{font-weight:700;opacity:.75;font-size:12.5px}
.datebar .todaybtn{flex:none;font-size:12px;font-weight:800;color:var(--brand-2);background:var(--sale-bg);padding:9px 11px;border-radius:9px}

.todaybar{margin-top:9px;display:flex;align-items:center;gap:8px;background:var(--chip);border-radius:10px;padding:8px 12px;font-size:12.5px;color:var(--muted);font-weight:600}
.todaybar b{color:var(--brand-2);font-variant-numeric:tabular-nums;font-size:13.5px}

/* ---- 스코프 탭 ---- */
nav.tabs{display:flex;gap:7px;padding:12px 0 16px;margin:0}
nav.tabs button{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:13px;font-weight:800;letter-spacing:-.01em;padding:9px 6px;border-radius:11px;text-align:center}
nav.tabs button.on.all{background:var(--brand);color:#fff;border-color:var(--brand)}
nav.tabs button.on.routine{background:var(--sale-bg);color:var(--sale);border-color:var(--sale-bg)}
nav.tabs button.on.customer{background:var(--jeonse-bg);color:var(--jeonse);border-color:var(--jeonse-bg)}

/* ---- 고객 선택 (매물뷰 스타일 커스텀 드롭다운) ---- */
.cust-bar{padding:20px 12px 0;display:none;gap:8px;flex-direction:column}
.sortpick-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:11px;background:var(--surface);font-weight:700;color:var(--ink);font-size:13.5px}
.sortpick-btn .car{color:var(--muted);font-size:11px;transition:transform .15s}
.sortpick-btn.open .car{transform:rotate(180deg)}
.sortpick-pop{position:absolute;left:0;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--line);border-radius:13px;box-shadow:0 8px 24px rgba(20,24,32,.14);z-index:45;overflow:hidden;display:none}
.sortpick-pop.open{display:block}
.sortpick-pop .opt{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;font-size:13.5px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--line-2)}
.sortpick-pop .opt:last-child{border-bottom:0}
.sortpick-pop .opt:active{background:var(--line-2)}
.sortpick-pop .opt.sel{color:var(--brand-2);font-weight:800}
.sortpick-pop .opt .ck{color:var(--brand-2);font-weight:900;opacity:0;}
.sortpick-pop .opt.sel .ck{opacity:1}
.cond-chip{display:inline-flex;align-items:center;gap:5px;align-self:flex-end;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--brand-2)}
.cond-chip:active{background:var(--line-2)}
.cond-chip b{color:var(--ink);font-size:13.5px}
.cond-chip .more{margin-left:auto;color:var(--brand-2);font-weight:800;font-size:12px}

/* ---- 필터 칩 ---- */
.chips{display:flex;gap:7px;overflow-x:auto;padding:12px 12px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:7px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chip .n{opacity:.65;font-size:11.5px;margin-left:3px;font-variant-numeric:tabular-nums}

.banner{margin:12px 16px 0;background:var(--jeonse-bg);color:var(--jeonse);border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:600;display:none}
.banner.show{display:block}

/* ---- 카드 ---- */
main{padding:8px 12px 0;display:flex;flex-direction:column;gap:11px}
.card{border-radius:14px;padding:13px 14px 12px;box-shadow:var(--shadow);border:1px solid var(--line);background:var(--surface)}
.card.st-s0{background:#FBFCFF;border-color:#E4E9FB}
.card.st-s1{background:#F6FBF7;border-color:#DCEEE1}
.card.st-s2{background:#FEFAF3;border-color:#F3E4C5}
.card.st-s3{background:#F7F8F9;border-color:var(--line)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.idrow{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.idchip{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px;background:#EEF0F3;color:#5B6472;font-family:ui-monospace,"SF Mono",monospace;letter-spacing:0}
.idchip.cust{background:var(--jeonse-bg);color:var(--jeonse)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:11px;font-weight:800;padding:3px 7px;border-radius:7px;letter-spacing:-.01em;background:#F0F1F4;color:#3B414C}
.tag.deal.월세{background:var(--wolse-bg);color:var(--wolse)}
.tag.deal.전세{background:var(--jeonse-bg);color:var(--jeonse)}
.tag.deal.매매{background:var(--sale-bg);color:var(--sale)}
.tag.deal.단기임대{background:#E9EDF5;color:#5A6B86}
/* 매물종류 — 매물뷰 팔레트 그대로 */
.tag.type-상가{background:#E8EEFF;color:#2746E6}
.tag.type-사무실{background:#E9EAFB;color:#3D43C4}
.tag.type-지식산업센터{background:#E5F0FA;color:#1E6FB8}
.tag.type-건물{background:#ECEAF8;color:#5B3FB5}
.tag.type-아파트{background:#E4F5EA;color:#1F7A4D}
.tag.type-오피스텔{background:#E2F4F0;color:#0E8C7A}
.tag.type-주택빌라{background:#EBF4E0;color:#4F7A1F}
.tag.type-원투룸{background:#E1F3F7;color:#11789B}
.tag.type-공장창고{background:#F2EDE4;color:#876730}
.tag.type-토지{background:#FBF1DD;color:#9A6B14}
.tag.type-재개발{background:#F6E9E2;color:#B05A2E}
.tag.type-분양{background:#F6E7F1;color:#A23B86}
.tag.fit-적합{background:var(--sale-bg);color:var(--sale)}
.tag.fit-적합_예산확인{background:var(--jeonse-bg);color:var(--jeonse)}
.tag.fit-조건미달{background:var(--danger-bg);color:var(--danger)}
.tag.fit-고객정보없음{background:var(--gray-bg);color:var(--gray)}
.bname{font-size:16px;font-weight:800;letter-spacing:-.02em}
.addr{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.farmdate{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:12.5px;font-weight:800;color:var(--brand-2)}
.farmdate .dot{width:6px;height:6px;border-radius:50%;background:var(--brand-2)}
.specs{margin-top:7px;font-size:12.5px;color:var(--muted);display:grid;grid-template-columns:1fr 1fr;gap:5px 10px}
.specs .item b{color:var(--ink);font-weight:800;font-variant-numeric:tabular-nums;font-size:13px}
.specs .pyung{grid-column:1/-1;font-weight:600;color:var(--muted);font-size:12.5px;margin-top:2px}
.specs .pyung b{font-weight:700;color:var(--ink);font-size:13px}
.memo{margin-top:7px;font-size:12px;color:var(--muted);background:var(--bg);border-radius:8px;padding:7px 10px}
.stamp{flex:none;min-width:76px;padding:7px 9px;border-radius:9px;font-weight:800;font-size:12.5px;border:1.5px solid;letter-spacing:-.01em;transition:transform .08s;text-align:center}
.stamp:active{transform:scale(.94)}
.stamp.s0{color:var(--wolse);border-color:var(--wolse);background:var(--wolse-bg)}
.stamp.s1{color:var(--sale);border-color:var(--sale);background:var(--sale-bg)}
.stamp.s2{color:var(--jeonse);border-color:var(--jeonse);background:var(--jeonse-bg)}
.stamp.s3{color:var(--gray);border-color:var(--gray);background:var(--gray-bg)}
.card-foot{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:11px}
.link-btn{text-align:center;padding:8px 4px;border-radius:9px;font-size:11.5px;font-weight:700;text-decoration:none;border:1.5px solid var(--line);color:var(--muted);background:var(--surface);display:flex;flex-direction:row;align-items:center;justify-content:center;gap:5px}
.link-btn .ic{font-size:13px}
.link-btn:active{background:var(--line-2)}
.link-btn.del{color:var(--danger);border-color:#F3D3D3}
.link-btn.del:active{background:var(--danger-bg)}
.empty{text-align:center;padding:64px 24px;color:var(--muted)}
.empty .em-t{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px}
.empty .em-s{font-size:13px}

/* ---- FAB & 시트 ---- */
.fab{position:absolute;right:16px;bottom:calc(18px + env(safe-area-inset-bottom));background:var(--brand-2);color:#fff;font-weight:800;font-size:14px;padding:15px 22px;border-radius:999px;box-shadow:0 6px 18px rgba(31,122,77,.35);display:flex;align-items:center;gap:7px;pointer-events:auto}
.fab:active{transform:scale(.96)}
.scrim{position:fixed;inset:0;background:rgba(15,18,24,.42);z-index:50;display:none}
.scrim.on{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--surface);border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;transform:translateY(105%);transition:transform .25s ease;padding:6px 18px calc(24px + env(safe-area-inset-bottom))}
.sheet.on{transform:translateY(0)}
.sheet-grip{width:38px;height:4px;background:#D9DCE1;border-radius:3px;margin:10px auto 14px}
.sheet h2{font-size:16px;font-weight:800;margin:0 0 14px}
.f-row{display:flex;gap:10px}
.f-row>*{flex:1}
.f-group{margin-bottom:12px}
.f-group label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.f-group input,.f-group select,.f-group textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--bg);font-family:inherit;font-size:14.5px;color:var(--ink);outline:0}
.f-group textarea{resize:none;height:60px}
.f-group input:focus,.f-group select:focus,.f-group textarea:focus{border-color:var(--brand-2);background:#fff}
.hint{font-size:11.5px;color:#9aa1ab;margin-top:4px}
.submit{width:100%;padding:15px;border-radius:13px;background:var(--brand-2);color:#fff;font-weight:800;font-size:15.5px;margin-top:6px}
.submit:active{opacity:.9}
.seg{display:flex;background:var(--chip);border-radius:11px;padding:4px;margin-bottom:14px}
.seg button{flex:1;padding:9px 0;border-radius:8px;font-weight:800;font-size:13.5px;color:var(--muted)}
.seg button.on.routine{background:var(--surface);color:var(--sale);box-shadow:var(--shadow)}
.seg button.on.customer{background:var(--surface);color:var(--jeonse);box-shadow:var(--shadow)}

/* ---- 고객상세 모달 ---- */
.modal-scrim{position:fixed;inset:0;background:rgba(15,18,24,.5);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
.modal-scrim.on{display:flex}
.modal{width:100%;max-width:360px;background:var(--surface);border-radius:18px;padding:20px;max-height:80vh;overflow-y:auto}
.modal .m-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal .m-title{font-size:16px;font-weight:800}
.modal .m-close{width:28px;height:28px;border-radius:50%;background:var(--chip);display:grid;place-items:center;color:var(--muted)}
.crow{display:flex;padding:9px 0;border-bottom:1px solid var(--line-2);font-size:13px;gap:10px}
.crow:last-child{border-bottom:0}
.crow .ck{flex:none;width:98px;color:var(--muted);font-weight:700}
.crow .cv{flex:1;color:var(--ink);font-weight:600;line-height:1.5}

/* ---- 고객 리스트(전체보기) ---- */
.custlist-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.custlist-item .cn{font-weight:800;font-size:14.5px}
.custlist-item .cs{font-size:12px;color:var(--muted);margin-top:3px}

/* ---- 캘린더 팝업 ---- */
.cal-scrim{position:fixed;inset:0;background:rgba(15,18,24,.5);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
.cal-scrim.on{display:flex}
.cal-box{width:100%;max-width:340px;background:var(--surface);border-radius:18px;padding:18px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-head .cm-title{font-weight:800;font-size:15px}
.cal-head button{width:30px;height:30px;border-radius:9px;background:var(--chip);color:var(--muted)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-wd{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;font-size:13px;font-weight:700;color:var(--ink);position:relative}
.cal-day.mute{color:#C7CCD3}
.cal-day.today{outline:1.5px solid var(--brand-2)}
.cal-day.sel{background:var(--brand);color:#fff}
.cal-day .dot{width:4px;height:4px;border-radius:50%;background:var(--brand-2);position:absolute;bottom:5px}
.cal-day.sel .dot{background:#fff}

.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:70;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-logo">the<span class="o">o</span></div>
  <div class="lock-sub">파밍서치 · eXp Korea</div>
  <div class="lock-box">
    <div class="lock-title">비밀번호를 입력하세요</div>
    <input id="lockInput" class="lock-input" type="password" name="pin-code-not-a-password"
      inputmode="numeric" maxlength="8" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false">
    <button class="lock-btn" id="lockBtn">확인</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<div class="app-shell">
<header>
  <div class="head-row">
    <div class="brand" id="logoReset">
      <span class="logo">the<span class="o">o</span></span>
      <span class="by">파밍서치 · eXp Korea</span>
    </div>
    <div class="head-actions">
      <button class="icon-btn" id="btnCustList" title="고객조건 보기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="icon-btn" id="btnRefresh" title="새로고침">

<script>
const CONFIG = {
  DATA_URL: "https://script.google.com/macros/s/AKfycbzzJs4Y8_iNMYtXQjcBmKCgJkHrAR2YvFFAKJI4Xx0ujgjLkbIZGvXcWeM5B1WPN7kD/exec"
};
const STATUS = ['파밍예정','파밍완료','파밍보류','파밍취소'];
const STATUS_CLASS = {'파밍예정':'s0','파밍완료':'s1','파밍보류':'s2','파밍취소':'s3'};
const WD = ['일','월','화','수','목','금','토'];

let state = {
  date: null, scope: 'all', custId: '', statusFilter: '전체',
  customers: [], properties: [], editId: null, calViewMonth: null,
};

const $ = id => document.getElementById(id);
function toDateStr(dt){ return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0'); }
const todayStr = () => toDateStr(new Date());
const num = v => { const n = parseFloat(String(v).replace(/,/g,'')); return isNaN(n) ? null : n; };
const fmt = v => { const n = num(v); return n===null ? '-' : n.toLocaleString('ko-KR'); };
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function mapUrl(addr){ return 'https://map.naver.com/p/search/' + encodeURIComponent(addr); }
const TYPE_CLASS_MAP = {'토지(나대지)':'토지', '재건축재개발':'재개발'};
function typeClass(t){ return TYPE_CLASS_MAP[t] || t || ''; }
function sortedCustomers(){
  return [...state.customers].sort((a,b)=> String(a.고객ID).localeCompare(String(b.고객ID)));
}
function propLinkUrl(v){
  if(!v) return '';
  const s = String(v).trim();
  if(/^\d+$/.test(s)) return 'https://fin.land.naver.com/articles/' + s;
  if(/^https?:\/\//.test(s)) return s;
  return '';
}
function fmtDateDisplay(d){
  const dt = new Date(d + 'T00:00:00');
  return (dt.getMonth()+1) + '월 ' + dt.getDate() + '일';
}

/* ===== JSONP ===== */
function jsonp(params, timeoutMs){
  return new Promise((resolve, reject)=>{
    const cb = "__fs_cb_" + Date.now() + "_" + Math.floor(Math.random()*100000);
    const s = document.createElement('script');
    let done = false;
    window[cb] = data => { done = true; cleanup(); resolve(data); };
    function cleanup(){ try{ delete window[cb]; }catch(e){} if(s.parentNode) s.parentNode.removeChild(s); }
    s.onerror = () => { if(!done){ cleanup(); reject(new Error('load fail')); } };
    const qs = Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k]==null?'':params[k])).join('&');
    const sep = CONFIG.DATA_URL.indexOf('?')>=0 ? '&' : '?';
    s.src = CONFIG.DATA_URL + sep + qs + '&callback=' + cb;
    document.head.appendChild(s);
    setTimeout(()=>{ if(!done){ cleanup(); reject(new Error('timeout')); } }, timeoutMs || 15000);
  });
}
async function jsonpRetry(params, timeoutMs){
  try{ return await jsonp(params, timeoutMs); }
  catch(e){ await new Promise(r=>setTimeout(r,800)); return await jsonp(params, timeoutMs); }
}

/* ===== 데이터 로드 ===== */
const DATA_CACHE_KEY = 'farming_data_cache_v2';
async function loadData(showToast){
  try{
    const d = await jsonpRetry({mode:'data'});
    state.customers = d.customers || [];
    state.properties = d.properties || [];
    try{ localStorage.setItem(DATA_CACHE_KEY, JSON.stringify(d)); }catch(e){}
    $('demoBanner').classList.remove('show');
    render();
    if(showToast) toast('불러오기 완료');
  }catch(e){
    try{
      const c = JSON.parse(localStorage.getItem(DATA_CACHE_KEY));
      if(c){ state.customers=c.customers||[]; state.properties=c.properties||[]; $('demoBanner').classList.add('show'); render(); return; }
    }catch(_){}
    toast('불러오기 실패'); render();
  }
}

/* ===== 필터 ===== */
function scopeMatch(p){
  if(state.scope==='routine') return !p.고객ID;
  if(state.scope==='customer') return !!p.고객ID && (!state.custId || p.고객ID===state.custId);
  return true;
}
function dateMatch(p){ return p.파밍일자 === state.date; }
function statusMatch(p){ return state.statusFilter==='전체' || p.파밍여부===state.statusFilter; }
function visibleProps(){ return state.properties.filter(p=>scopeMatch(p) && dateMatch(p) && statusMatch(p)); }

/* ===== 렌더 ===== */
function render(){
  const dt = new Date(state.date + 'T00:00:00');
  $('dateWd').textContent = WD[dt.getDay()] + '요일';
  $('dateMain').textContent = dt.getFullYear() + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + String(dt.getDate()).padStart(2,'0');
  $('dateToday').style.display = state.date === todayStr() ? 'none' : 'block';
  $('todayCount').textContent = state.properties.filter(p=>p.파밍일자===todayStr()).length;

  $('tabAll').classList.toggle('on', state.scope==='all');
  $('tabRoutine').classList.toggle('on', state.scope==='routine');
  $('tabCust').classList.toggle('on', state.scope==='customer');
  $('custBar').style.display = state.scope==='customer' ? 'flex' : 'none';

  if(state.scope==='customer'){
    const options = [{id:'', label:'전체 고객'}, ...sortedCustomers().map(c=>({id:c.고객ID, label:c.고객ID+' · '+c.고객명}))];
    const selOpt = options.find(o=>o.id===state.custId) || options[0];
    $('custPickLabel').textContent = selOpt.label;
    $('custPickPop').innerHTML = options.map(o=>
      `<div class="opt ${o.id===state.custId?'sel':''}" data-cust="${o.id}"><span>${o.label}</span><span class="ck">✓</span></div>`
    ).join('');
    const c = state.customers.find(x=>x.고객ID===state.custId);
    if(c){
      $('condChip').style.display = 'flex';
    } else {
      $('condChip').style.display = 'none';
    }
  }

  const scopedForCount = state.properties.filter(p=>scopeMatch(p) && dateMatch(p));
  const cnt = st => scopedForCount.filter(p=>p.파밍여부===st).length;
  $('chips').innerHTML = ['전체', ...STATUS].map(st=>{
    const n = st==='전체' ? scopedForCount.length : cnt(st);
    return `<button class="chip ${state.statusFilter===st?'on':''}" data-status="${st}">${st}<span class="n">${n}</span></button>`;
  }).join('');

  const list = visibleProps();
  if(!list.length){
    $('list').innerHTML = `<div class="empty"><div class="em-t">이 날짜엔 파밍 매물이 없습니다</div><div class="em-s">아래 ＋ 버튼으로 매물을 추가하세요</div></div>`;
    return;
  }
  $('list').innerHTML = list.map(p=>{
    const fit = p.적합여부;
    const fitClass = fit ? 'fit-' + fit.replace(/[()]/g,'').replace(/\s/g,'_') : '';
    const priceLine = (p.거래유형==='월세'||p.거래유형==='단기임대')
      ? `보증금/월세` : (p.거래유형==='매매'?'매매가':'보증금');
    const link = propLinkUrl(p.매물링크);
    return `<div class="card ${STATUS_CLASS[p.파밍여부]?'st-'+STATUS_CLASS[p.파밍여부]:'st-s0'}">
      <div class="idrow">
        <span class="idchip">${p.매물ID||''}</span>
        ${p.고객ID?`<span class="idchip cust">${p.고객ID}</span>`:''}
      </div>
      <div class="card-top">
        <div style="min-width:0">
          <div class="tags">
            ${p.거래유형?`<span class="tag deal ${p.거래유형}">${p.거래유형}</span>`:''}
            ${p.유형?`<span class="tag type-${typeClass(p.유형)}">${p.유형}</span>`:''}
            ${fit?`<span class="tag ${fitClass}">${fit}</span>`:''}
          </div>
          <div class="bname">${p.건물명 || p.주소 || '(이름 없음)'}</div>
          ${p.건물명 && p.주소 ? `<div class="addr">${p.주소}</div>` : ''}
        </div>
        <button class="stamp ${STATUS_CLASS[p.파밍여부]||'s0'}" data-stamp="${p.매물ID}">${p.파밍여부||'파밍예정'}</button>
      </div>
      <div class="farmdate"><span class="dot"></span>파밍일자 ${p.파밍일자||'-'}</div>
      <div class="specs">
        <div class="item">평수 <b>${p.전용면적?p.전용면적+'평':'-'}</b></div>
        <div class="item">층수 <b>${p.층수?p.층수+(p.총층?'/'+p.총층:'')+'층':'-'}</b></div>
        <div class="item">${priceLine==='매매가'?'매매가':'보증금'} <b>${fmt(p.보증금매매가)}</b></div>
        ${(p.거래유형==='월세'||p.거래유형==='단기임대')?`<div class="item">월세 <b>${fmt(p.월세)}</b></div>`:''}
        <div class="item">관리비 <b>${fmt(p.관리비)}</b></div>
        <div class="pyung">평단가 <b>${p.평단가!==''&&p.평단가!==undefined?p.평단가:'-'}</b>만</div>
      </div>
      ${p.메모?`<div class="memo">${p.메모}</div>`:''}
      <div class="card-foot">
        ${p.주소?`<a class="link-btn" href="${mapUrl(p.주소)}" target="_blank" rel="noopener"><span class="ic">🗺️</span>매물지도</a>`:`<span class="link-btn" style="opacity:.35"><span class="ic">🗺️</span>매물지도</span>`}
        ${link?`<a class="link-btn" href="${link}" target="_blank" rel="noopener"><span class="ic">🔗</span>매물광고</a>`:`<span class="link-btn" style="opacity:.35"><span class="ic">🔗</span>매물광고</span>`}
        <button class="link-btn" data-edit="${p.매물ID}"><span class="ic">✏️</span>매물수정</button>
        <button class="link-btn del" data-del="${p.매물ID}"><span class="ic">🗑️</span>매물삭제</button>
      </div>
    </div>`;
  }).join('');
}

/* ===== 날짜 이동 ===== */
function shiftDate(days){
  const [y,m,d] = state.date.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + days);
  state.date = toDateStr(dt);
  render();
}
$('datePrev').onclick = ()=>shiftDate(-1);
$('dateNext').onclick = ()=>shiftDate(1);
$('dateToday').onclick = ()=>{ state.date = todayStr(); render(); };

/* ===== 캘린더 ===== */
let calTarget = 'main';
let formDateValue = '';
let formCustId = '';

function openCalendar(target, baseDate){
  calTarget = target || 'main';
  const [y,m] = (baseDate || state.date).split('-').map(Number);
  state.calViewMonth = {y, m};
  renderCalendar();
  $('calScrim').classList.add('on');
}
function renderCalendar(){
  const {y,m} = state.calViewMonth;
  const selDate = calTarget === 'form' ? formDateValue : state.date;
  $('calTitle').textContent = y + '년 ' + m + '월';
  const first = new Date(y, m-1, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const daysInPrevMonth = new Date(y, m-1, 0).getDate();
  const farmedDates = new Set(state.properties.map(p=>p.파밍일자).filter(Boolean));
  let cells = WD.map(w=>`<div class="cal-wd">${w}</div>`).join('');
  for(let i=startDow-1;i>=0;i--){
    cells += `<div class="cal-day mute">${daysInPrevMonth-i}</div>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const ds = y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday = ds === todayStr();
    const isSel = ds === selDate;
    cells += `<button class="cal-day ${isToday?'today':''} ${isSel?'sel':''}" data-date="${ds}">${d}${farmedDates.has(ds)?'<span class="dot"></span>':''}</button>`;
  }
  const totalCells = startDow + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for(let d=1; d<=trailing; d++) cells += `<div class="cal-day mute">${d}</div>`;
  $('calGrid').innerHTML = cells;
}
$('dateOpen').onclick = ()=>openCalendar('main');
$('calScrim').onclick = e=>{ if(e.target.id==='calScrim') $('calScrim').classList.remove('on'); };
$('calPrev').onclick = ()=>{ let {y,m}=state.calViewMonth; m--; if(m<1){m=12;y--;} state.calViewMonth={y,m}; renderCalendar(); };
$('calNext').onclick = ()=>{ let {y,m}=state.calViewMonth; m++; if(m>12){m=1;y++;} state.calViewMonth={y,m}; renderCalendar(); };
$('calGrid').addEventListener('click', e=>{
  const b = e.target.closest('[data-date]'); if(!b) return;
  if(calTarget === 'form'){
    formDateValue = b.dataset.date;
    $('fDateLabel').textContent = formDateValue;
  } else {
    state.date = b.dataset.date;
    render();
  }
  $('calScrim').classList.remove('on');
});
$('fDateBtn').onclick = ()=>openCalendar('form', formDateValue || state.date);

/* ===== 탭/필터 이벤트 ===== */
$('logoReset').onclick = ()=>{ state.scope='all'; state.statusFilter='전체'; state.custId=''; state.date=todayStr(); render(); };
$('tabAll').onclick = ()=>{ state.scope='all'; state.statusFilter='전체'; render(); };
$('tabRoutine').onclick = ()=>{ state.scope='routine'; state.statusFilter='전체'; render(); };
$('tabCust').onclick = ()=>{ state.scope='customer'; state.statusFilter='전체'; render(); };
$('custPickBtn').onclick = ()=>{ $('custPickBtn').classList.toggle('open'); $('custPickPop').classList.toggle('open'); };
$('custPickPop').addEventListener('click', e=>{
  const o = e.target.closest('[data-cust]'); if(!o) return;
  state.custId = o.dataset.cust;
  $('custPickBtn').classList.remove('open'); $('custPickPop').classList.remove('open');
  render();
});
document.addEventListener('click', e=>{
  if(!e.target.closest('#custPickBtn') && !e.target.closest('#custPickPop')){
    $('custPickBtn').classList.remove('open'); $('custPickPop').classList.remove('open');
  }
});
$('condChip').onclick = ()=>{ if(state.custId) openCustomerDetail(state.custId); };
$('chips').addEventListener('click', e=>{
  const b = e.target.closest('.chip'); if(!b) return;
  state.statusFilter = b.dataset.status; render();
});

/* ===== 카드 액션 ===== */
$('list').addEventListener('click', e=>{
  const st = e.target.closest('[data-stamp]');
  if(st){
    const p = state.properties.find(x=>x.매물ID===st.dataset.stamp); if(!p) return;
    const next = STATUS[(STATUS.indexOf(p.파밍여부)+1) % STATUS.length] || '파밍예정';
    p.파밍여부 = next;
    render();
    jsonp({mode:'status', 매물ID:p.매물ID, 파밍여부:next}).catch(()=>toast('전송 실패 — 시트에 반영 안됐을 수 있음'));
    toast(next + ' 처리');
    return;
  }
  const ed = e.target.closest('[data-edit]');
  if(ed){ openSheet(ed.dataset.edit); return; }
  const del = e.target.closest('[data-del]');
  if(del){
    if(!confirm('이 매물을 삭제할까요? 구글시트에서도 함께 삭제됩니다.')) return;
    const id = del.dataset.del;
    state.properties = state.properties.filter(p=>p.매물ID!==id);
    render();
    jsonp({mode:'delete', 매물ID:id}).then(()=>toast('삭제 완료')).catch(()=>toast('삭제 전송 실패'));
  }
});

/* ===== 매물 추가/수정 시트 ===== */
let addScope = 'routine';
$('segScope').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  addScope = b.dataset.v;
  $('segScope').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  $('custPickWrap').style.display = addScope==='customer' ? 'block' : 'none';
});

function openSheet(editId){
  state.editId = editId || null;
  const p = editId ? state.properties.find(x=>x.매물ID===editId) : null;
  $('sheetTitle').textContent = p ? '매물 수정' : '매물 추가';
  addScope = p ? (p.고객ID ? 'customer' : 'routine') : (state.scope==='customer' ? 'customer' : 'routine');
  $('segScope').querySelectorAll('button').forEach(b=>b.classList.toggle('on', b.dataset.v===addScope));
  $('custPickWrap').style.display = addScope==='customer' ? 'block' : 'none';
  formCustId = p?.고객ID || state.custId || '';
  renderFCustPop();
  $('fCustLabel').textContent = formCustId ? (state.customers.find(c=>c.고객ID===formCustId)?.고객ID + ' · ' + state.customers.find(c=>c.고객ID===formCustId)?.고객명) : '고객 선택';

  formDateValue = p?.파밍일자 || state.date;
  $('fDateLabel').textContent = formDateValue;
  $('fLink').value = p?.매물링크 || '';
  $('fName').value = p?.건물명||''; $('fAddr').value = p?.주소||'';
  $('fType').value = p?.유형||'사무실'; $('fDeal').value = p?.거래유형||'월세';
  $('fFloor').value = p?.층수||''; $('fFloorAll').value = p?.총층||''; $('fArea').value = p?.전용면적||'';
  $('fDeposit').value = p?.보증금매매가||''; $('fRent').value = p?.월세||''; $('fMgmt').value = p?.관리비||'';
  $('fMemo').value = p?.메모||'';
  $('scrim').classList.add('on'); $('sheetAdd').classList.add('on');
}
function closeSheet(){ $('scrim').classList.remove('on'); $('sheetAdd').classList.remove('on'); }
function renderFCustPop(){
  $('fCustPop').innerHTML = sortedCustomers().map(c=>
    `<div class="opt ${c.고객ID===formCustId?'sel':''}" data-fcust="${c.고객ID}"><span>${c.고객ID} · ${c.고객명}</span><span class="ck">✓</span></div>`
  ).join('') || '<div class="opt">등록된 고객이 없습니다</div>';
}
$('fCustBtn').onclick = ()=>{ $('fCustBtn').classList.toggle('open'); $('fCustPop').classList.toggle('open'); };
$('fCustPop').addEventListener('click', e=>{
  const o = e.target.closest('[data-fcust]'); if(!o) return;
  formCustId = o.dataset.fcust;
  const c = state.customers.find(x=>x.고객ID===formCustId);
  $('fCustLabel').textContent = c ? (c.고객ID + ' · ' + c.고객명) : '고객 선택';
  $('fCustBtn').classList.remove('open'); $('fCustPop').classList.remove('open');
  renderFCustPop();
});
document.addEventListener('click', e=>{
  if(!e.target.closest('#fCustBtn') && !e.target.closest('#fCustPop')){
    $('fCustBtn').classList.remove('open'); $('fCustPop').classList.remove('open');
  }
});

$('fabAdd').onclick = ()=>openSheet();
$('scrim').onclick = e=>{ if(e.target.id==='scrim') closeSheet(); };

$('btnSave').onclick = async ()=>{
  const isEdit = !!state.editId;
  const linkRaw = $('fLink').value.trim();
  const link = /^\d+$/.test(linkRaw) ? ('https://fin.land.naver.com/articles/' + linkRaw) : linkRaw;
  const custId = addScope==='customer' ? formCustId : '';
  const p = isEdit ? state.properties.find(x=>x.매물ID===state.editId)
                   : {매물ID:'(임시)', 파밍여부:'파밍예정'};
  Object.assign(p, {
    파밍일자: formDateValue || todayStr(),
    매물링크: link, 건물명:$('fName').value.trim(), 주소:$('fAddr').value.trim(),
    유형:$('fType').value, 거래유형:$('fDeal').value,
    층수:$('fFloor').value.trim(), 총층:$('fFloorAll').value.trim(), 전용면적:$('fArea').value.trim(),
    보증금매매가:$('fDeposit').value.trim(), 월세:$('fRent').value.trim(), 관리비:$('fMgmt').value.trim(),
    메모:$('fMemo').value.trim(), 고객ID: custId,
  });
  if(!p.주소 && !p.매물링크){ toast('주소 또는 매물링크를 입력하세요'); return; }
  if(!isEdit) state.properties.unshift(p);
  closeSheet(); render();
  toast(isEdit?'수정 완료':'매물 추가 완료');
  try{
    const res = await jsonp(isEdit ? {mode:'update', ...p} : {mode:'add', ...p});
    if(!isEdit && res && res.매물ID){ p.매물ID = res.매물ID; render(); }
  }catch(e){ toast('전송 실패 — 시트에 반영 안됐을 수 있음'); }
};

/* ===== 고객 상세 모달 ===== */
function openCustomerDetail(id){
  const c = state.customers.find(x=>x.고객ID===id); if(!c) return;
  $('cmTitle').textContent = c.고객ID;
  $('cmBody').innerHTML = [
    ['고객명', c.고객명], ['희망 지역', c.희망지역], ['희망 거래유형', c.희망거래유형],
    ['평수(최소)', c.평수최소?c.평수최소+'평':'-'], ['평수(최대)', c.평수최대?c.평수최대+'평':'-'],
    ['예산 보증금/매매가', c.예산보증금매매가], ['예산 월세', c.예산월세],
    ['희망 층수', c.희망층수], ['기타 요청사항', c.기타요청],
  ].map(([k,v])=>`<div class="crow"><div class="ck">${k}</div><div class="cv">${v||'-'}</div></div>`).join('');
  $('custModalScrim').classList.add('on');
}
$('cmClose').onclick = ()=>$('custModalScrim').classList.remove('on');
$('custModalScrim').onclick = e=>{ if(e.target.id==='custModalScrim') $('custModalScrim').classList.remove('on'); };

/* ===== 고객 전체 리스트 ===== */
function openCustList(){
  $('custListBody').innerHTML = sortedCustomers().map(c=>
    `<div class="custlist-item" data-cust="${c.고객ID}">
      <div class="cn">${c.고객ID} · ${c.고객명}</div>
      <div class="cs">${c.희망지역||'-'} · ${c.희망거래유형||'-'} · ${c.평수최소||'?'}~${c.평수최대||'?'}평</div>
    </div>`).join('') || '<div class="empty"><div class="em-t">등록된 고객이 없습니다</div></div>';
  $('scrimCustList').classList.add('on'); $('sheetCustList').classList.add('on');
}
$('btnCustList').onclick = openCustList;
$('scrimCustList').onclick = ()=>{ $('scrimCustList').classList.remove('on'); $('sheetCustList').classList.remove('on'); };
$('custListBody').addEventListener('click', e=>{
  const item = e.target.closest('[data-cust]'); if(!item) return;
  openCustomerDetail(item.dataset.cust);
});

$('btnRefresh').onclick = ()=>{
  $('btnRefresh').classList.add('spin');
  loadData(true).finally(()=> $('btnRefresh').classList.remove('spin'));
};

if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ===== 비밀번호 잠금 ===== */
(function(){
  const lockScreen = $('lockScreen'), lockInput = $('lockInput'), lockBtn = $('lockBtn'), lockErr = $('lockErr');
  let correctPass = null, passLoaded = false, passLoading = false;
  const PASS_CACHE_KEY = 'farming_pass_cache';
  try{ const cached = localStorage.getItem(PASS_CACHE_KEY); if(cached){ correctPass = cached; passLoaded = true; } }catch(e){}
  function unlock(){ lockScreen.style.display = 'none'; }
  function tryUnlock(){
    const entered = lockInput.value.trim();
    if(!entered){ lockErr.textContent = '비밀번호를 입력해 주세요'; return; }
    if(!passLoaded){ if(!passLoading){ lockErr.textContent = '서버에 연결하는 중...'; loadPass(); } return; }
    if(!correctPass || entered === correctPass){ unlock(); }
    else {
      lockErr.textContent = '비밀번호가 틀렸습니다';
      lockInput.value=''; lockInput.focus();
      lockInput.style.borderColor='#E03A3A'; setTimeout(()=>{lockInput.style.borderColor='';},800);
    }
  }
  lockBtn.addEventListener('click', tryUnlock);
  lockInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  async function loadPass(){
    if(passLoading) return; passLoading = true;
    const hadCache = passLoaded;
    try{
      const data = await jsonpRetry({mode:'pass'}, 15000);
      correctPass = data && data.pass !== undefined ? String(data.pass).trim() : '';
      passLoaded = true;
      if(!hadCache){ lockErr.textContent=''; lockInput.focus(); }
      try{ localStorage.setItem(PASS_CACHE_KEY, correctPass); }catch(e){}
      if(!correctPass && !hadCache) unlock();
    }catch(e){
      if(!hadCache) lockErr.textContent = '서버 연결이 원활하지 않습니다. 확인 버튼을 다시 눌러주세요';
    }finally{ passLoading = false; }
  }
  loadPass();
})();

/* ===== 초기화 ===== */
state.date = todayStr();
loadData();
</script>
